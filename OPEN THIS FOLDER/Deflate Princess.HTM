<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Deflate Princess Wizard</title>
<link rel="icon" href="favicon.ico">
<style>
body { 
    font-family: Verdana, sans-serif; 
    margin:0; padding:0; 
    background:black; /* black background */
    color: #fff; /* all text white */
    display:flex; 
    flex-direction:column; 
    align-items:center; 
    justify-content:flex-start; 
    height:100vh; 
    text-align:center;
}
header { 
    background:#222222; 
    color:#fff; 
    padding:15px 20px; 
    font-size:24px; 
    width:100%; 
    font-weight:bold;
    border-bottom:2px solid #fff;
    cursor:crosshair; 
}
#display { 
    font-family:"Courier New", monospace; 
    font-size:18px; 
    white-space:pre; 
    margin-top:40px; 
}
marquee { 
    font-weight:bold; 
    font-size:20px; 
    margin-top:20px; 
    color:#fff; /* marquee text white */
}
</style>
</head>
<body>

<header>Welcome to the Deflate Princess Wizard</header>
<marquee id="squeak" style="display:block;">squeak</marquee>
<pre id="display"></pre>

<script>
const stages = [
"[|(......(:.:)......)|]",
"[|(...(:.:)...)|]",
"[|(..(:.:)..)|]",
"[|(.(.:.).)|]",
"[|(.:.)|]",
"[|(:)|]",
"[(:)]",
"(:)",
".",
" "
];

const display = document.getElementById("display");
const squeak = document.getElementById("squeak");

// Show splash first
display.innerText = 
`  ____   ___  _   _ _   _ 
 | __ ) / _ \\| \\ | | \\ | |
 |  _ \\| | | |  \\| | \\| |
 | |_) | |_| | |\\  | |\\  |
 |____/ \\___/|_| \\_|_| \\_|

(c) Wjjsoft Technologies, 2025
The robots will consume us all`;

setTimeout(() => {
    display.innerText = "";
    squeak.style.display = "block"; // show marquee
    let index = 0;

    const interval = setInterval(() => {
        display.innerText = stages[index];
        index++;
        if(index >= stages.length){
            clearInterval(interval);
            setTimeout(() => {
                squeak.style.display = "none";
                display.innerText += "\n\nDeflation complete!\n";
            }, 500);
        }
    }, 500);

}, 5000); // show splash for 5 seconds
</script>

</body>
</html>
