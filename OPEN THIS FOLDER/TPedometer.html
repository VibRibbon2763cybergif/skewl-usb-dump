<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedometer</title>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #0d1117;
            color: #c9d1d9;
        }
        .container {
            background-color: #161b22;
            border: 1px solid #30363d;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-sizing: border-box;
        }
        h1 {
            margin-top: 0;
            color: #58a6ff;
            font-size: 32px;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #238636;
            color: white;
            border: 1px solid #2ea44f;
            border-radius: 6px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.1s;
        }
        button:hover {
            background-color: #2ea44f;
        }
        #result-text {
            font-size: 22px;
            color: #c9d1d9;
            margin-top: 30px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Pedometer</h1>
    <button onclick="scanPedometers()">SCAN</button>
    <div id="result-text">There are 0 pedometers in your area</div>
</div>

<script>
function scanPedometers() {
    const min = 1;
    const max = 9999999999999;
    
    // Generate the large random number
    const randomNumber = Math.floor(Math.random() * (max - min + 1)) + min;
    
    // Format number with commas
    const formattedNumber = randomNumber.toLocaleString();
    
    // Update the layout with your exact text string
    document.getElementById('result-text').innerText = `There are ${formattedNumber} pedometers in your area`;
}

// Automatically trigger a scan when the page loads
window.onload = scanPedometers;
</script>

</body>
</html>
